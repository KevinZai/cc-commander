# Task Commander — Overnight Batch Workflow
# DAG: checkpoint → execute-queue → verify-each → summary → notify
#
# Usage: Autonomous overnight batch execution with safety checkpoints, per-unit
# verification, and a morning summary report. Designed for /cc mode night.
# Built for safety: auto-checkpoints before execution, verification after each unit,
# cost tracking, abort conditions, and a notification on completion.

name: overnight-batch
description: Autonomous overnight batch execution with checkpoints, per-unit verification, and morning summary
version: "1.0"
cost_ceiling: "$5.00"

agents:
  checkpoint_agent:
    model: haiku
    role: Save state, create git branch, record baseline tests, verify pre-flight conditions
  queue_executor:
    model: sonnet
    role: Process work units sequentially with per-unit commits, test runs, and abort monitoring
  unit_verifier:
    model: haiku
    role: Verify each completed unit against baseline, spot-check quality, detect regressions
  summary_agent:
    model: sonnet
    role: Generate scannable morning report with results, problems, and next steps
  notifier:
    model: haiku
    role: Send completion alert via terminal output and push notification

dag:
  - step: checkpoint
    agent: checkpoint_agent
    input: |
      Prepare a safe checkpoint before an overnight autonomous run.

      Task: {{task_description}}
      Estimated duration: {{estimated_hours}} hours
      Work units: {{unit_count}} units to process
      Scope directories: {{scope_directories}}

      Pre-flight safety checklist:
      1. **Git state** — Verify working directory is clean (`git status`)
      2. **Branch** — Create overnight branch: `overnight/{{date}}-{{task_slug}}`
      3. **Dependencies** — Verify all required packages installed (`npm ci` or equivalent)
      4. **Tests baseline** — Run full test suite, record exact pass/fail counts
      5. **Config snapshot** — Record current config state for rollback reference
      6. **Cost estimate** — Calculate: {{unit_count}} units x {{cost_per_unit}} per unit

      Checkpoint steps:
      a. Run `git status` — MUST be clean (abort if dirty)
      b. Run `git checkout -b overnight/{{date}}-{{task_slug}}` (abort if branch exists)
      c. Run full test suite — record: {{X}} passing, {{Y}} failing
      d. Create checkpoint commit: `chore: overnight checkpoint — {{task_slug}} — baseline`
      e. Record environment: Node version, package manager, OS
      f. Calculate cost: {{unit_count}} units x {{cost_per_unit}} = ${{total_estimate}}

      Output format:
      ```markdown
      # Overnight Checkpoint

      ## Pre-flight
      - Git status: CLEAN / DIRTY ({{details}})
      - Branch: {{branch_name}}
      - Test baseline: {{pass_count}} passing, {{fail_count}} failing
      - Estimated cost: ${{estimate}} / ${{ceiling}} ceiling
      - Estimated duration: {{hours}} hours
      - Environment: Node {{version}}, {{package_manager}}, {{os}}

      ## Abort Conditions (enforced during execution)
      If ANY of these occur, execution STOPS immediately:
      - Test pass count drops below {{baseline_pass_count}}
      - Cumulative cost exceeds ${{ceiling}}
      - 3 consecutive units fail
      - A file outside {{scope_directories}} is modified
      - TypeScript compilation fails

      ## Checkpoint Commit
      {{commit_hash}} — chore: overnight checkpoint

      ## Status: READY / NOT READY
      {{reason_if_not_ready}}
      ```

      Rules:
      - NEVER proceed if git state is dirty
      - NEVER proceed if tests are failing at baseline (some known failures OK if documented)
      - NEVER proceed if estimated cost > 80% of ceiling
      - NEVER work on main branch — always create overnight/ branch
      - If NOT READY, explain exactly what needs to be fixed before retry
    output: checkpoint_state

  - step: execute-queue
    agent: queue_executor
    depends_on: [checkpoint]
    input: |
      Execute a batch of work units overnight, autonomously and safely.

      Task: {{task_description}}
      Work units (in order):
      {{unit_list}}

      Total units: {{unit_count}}
      Checkpoint state: {{checkpoint_state}}
      Baseline pass count: {{baseline_pass_count}}
      Cost ceiling: {{cost_ceiling}}
      Scope directories: {{scope_directories}}

      **Execution protocol — process ONE unit at a time, in strict order:**

      ```
      FOR each unit in work queue:
        1. Read the target file(s) for this unit
        2. Apply the transformation / implementation
        3. Run unit-specific tests (if they exist) or affected test files
        4. IF tests PASS:
           - Stage only changed files: `git add <specific_files>`
           - Commit: `chore(overnight): unit {{N}}/{{total}} — {{description}}`
           - Log: [DONE] unit {{N}} — {{elapsed_time}} — ${{unit_cost}}
        5. IF tests FAIL:
           - Attempt ONE targeted fix (max 60 seconds)
           - Re-run tests
           - IF still failing:
             - Revert changes: `git checkout -- <changed_files>`
             - Log: [SKIPPED] unit {{N}} — {{failure_reason}}
             - Continue to next unit
        6. Every 10 units (health check):
           - Run FULL test suite
           - Compare pass count to baseline
           - Log: [HEALTH] {{N}}/{{total}} done, {{pass_count}} passing, ${{cumulative_cost}} spent
           - IF pass count < baseline: ABORT with [REGRESSION] status
        7. After each unit:
           - Check cumulative cost against ceiling
           - IF cost > ceiling: ABORT with [BUDGET] status
           - IF 3 consecutive units skipped: ABORT with [CONSECUTIVE_FAILURES] status
      ```

      **Abort conditions — STOP IMMEDIATELY if any occur:**
      - Full test suite pass count drops below baseline ({{baseline_pass_count}})
      - Cumulative cost exceeds ${{cost_ceiling}}
      - 3 consecutive units fail or are skipped
      - A file outside {{scope_directories}} is modified
      - TypeScript compilation fails after a unit

      Output format:
      ```markdown
      # Overnight Execution Log

      ## Progress
      Total: {{total}} | Done: {{done}} | Skipped: {{skipped}} | Failed: {{failed}}
      Cost: ${{spent}} / ${{ceiling}}
      Duration: {{elapsed}}
      Abort: {{NO / YES — reason}}

      ## Unit Log
      | # | Unit | Status | Time | Cost | Note |
      |---|------|--------|------|------|------|
      | 1 | {{name}} | DONE | {{time}} | ${{cost}} | {{note}} |
      | 2 | {{name}} | SKIPPED | {{time}} | ${{cost}} | {{failure_reason}} |
      ...

      ## Health Checks
      | After Unit | Tests Passing | Baseline | Cost | Status |
      |------------|--------------|----------|------|--------|
      | 10 | {{count}} | {{baseline}} | ${{cost}} | OK / REGRESSION |
      ...

      ## Skipped Units (need manual attention)
      1. Unit {{N}}: {{name}} — {{failure_reason}}
         Attempted fix: {{what_was_tried}}
         Files affected: {{file_list}}

      ## Final Status: COMPLETE / PARTIAL / ABORTED
      Reason: {{if_not_complete}}
      Last successful commit: {{hash}}
      ```

      Rules:
      - COMMIT after every successful unit (granular rollback capability)
      - REVERT failed units completely (never leave broken code committed)
      - STOP on abort conditions — do not try to continue or work around
      - Log everything — the morning review depends on this log
      - Never modify files outside the declared scope directories
      - Never force-push or rebase during execution
      - Each commit message must include unit number and total for tracking
    output: execution_log

  - step: verify-each
    agent: unit_verifier
    depends_on: [execute-queue]
    input: |
      Verify the overnight batch execution results against the checkpoint baseline.

      Execution log: {{execution_log}}
      Checkpoint baseline: {{checkpoint_state}}

      Verification protocol:
      1. **Run full test suite** — Compare pass/fail counts to baseline
      2. **Audit git log** — Verify one commit per unit, correct message format
      3. **Check for regressions** — Tests that passed at baseline but fail now
      4. **Review skipped units** — Understand failure reason, assess if fixable
      5. **Spot-check quality** — Read 3-5 random completed units:
         - Does the change match the unit description?
         - Is the code quality acceptable (naming, structure, error handling)?
         - Any obvious bugs or shortcuts?
      6. **Check for scope violations** — Any files modified outside scope?
      7. **Verify cost tracking** — Does reported cost match expected cost?

      Output format:
      ```markdown
      # Overnight Verification

      ## Test Suite Comparison
      Baseline: {{baseline_pass}} passing, {{baseline_fail}} failing
      Current:  {{current_pass}} passing, {{current_fail}} failing
      Delta:    {{+/-}} passing, {{+/-}} failing
      Regressions: {{count}}
      {{regression_list_if_any}}

      ## Git Log Audit
      Expected commits: {{expected_count}}
      Actual commits: {{actual_count}}
      Format correct: YES / NO ({{details}})
      Orphaned changes (uncommitted): YES / NO
      Scope violations: {{count}} ({{details}})

      ## Skipped Units Assessment
      | # | Unit | Failure Reason | Fixable | Estimated Effort | Priority |
      |---|------|---------------|---------|-----------------|----------|
      | {{N}} | {{name}} | {{reason}} | Yes/No/Maybe | {{LOW/MED/HIGH}} | {{P1-P3}} |

      ## Quality Spot Check ({{N}} units sampled)
      | Unit | Quality | Matches Description | Concerns |
      |------|---------|-------------------|----------|
      | {{name}} | GOOD/OK/POOR | YES/NO | {{notes}} |

      ## Cost Verification
      Reported: ${{reported}}
      Expected: ${{expected}} ({{unit_count}} x ${{per_unit}})
      Variance: {{percentage}}

      ## Verdict: CLEAN / REGRESSIONS / PROBLEMS
      {{detailed_reasoning}}
      ```

      Rules:
      - Actually run the tests — do not trust the execution log alone
      - Report exact regression list with test names if any tests regressed
      - Be honest about quality — flag poor work even if tests pass
      - If regressions exist, use `git bisect` or log analysis to identify which commit broke them
      - Spot-check must be random (not cherry-picked successes)
    output: verification_report

  - step: summary
    agent: summary_agent
    depends_on: [verify-each]
    input: |
      Produce the morning summary report for the overnight batch run.

      Checkpoint: {{checkpoint_state}}
      Execution log: {{execution_log}}
      Verification report: {{verification_report}}

      This report must be scannable in 60 seconds. The human will read this first thing
      in the morning. Lead with the most important information.

      Output format:
      ```markdown
      # Overnight Run Summary
      **Date:** {{date}}
      **Task:** {{task_description}}
      **Duration:** {{elapsed}}
      **Cost:** ${{total_cost}} / ${{ceiling}} ceiling

      ## Results at a Glance
      | Metric | Value | Status |
      |--------|-------|--------|
      | Units completed | {{done}}/{{total}} | {{icon}} |
      | Units skipped | {{skipped}} | {{icon}} |
      | Tests passing | {{current}} (baseline: {{baseline}}) | {{icon}} |
      | Regressions | {{count}} | {{icon}} |
      | Cost | ${{spent}} / ${{ceiling}} | {{icon}} |
      | Overall | {{CLEAN / PARTIAL / PROBLEMS}} | {{icon}} |

      ## What Got Done
      {{2-3 sentence summary of completed work — be specific about what changed}}

      ## What Needs Attention (priority order)
      1. {{highest_priority_item}} — {{why_it_matters}}
      2. {{next_item}} — {{why_it_matters}}
      ...

      ## Regressions (if any)
      | Test | Introduced By | Commit | Likely Cause |
      |------|-------------|--------|-------------|
      | {{test_name}} | Unit {{N}} | {{hash}} | {{analysis}} |

      ## Skipped Units (manual queue)
      | # | Unit | Reason | Suggested Fix |
      |---|------|--------|--------------|
      | {{N}} | {{name}} | {{reason}} | {{suggestion}} |

      ## Quality Assessment
      Spot-check results: {{X}}/{{Y}} units rated GOOD or OK
      Concerns: {{list_any_quality_concerns}}

      ## Recommended Next Steps
      1. {{step_1}} — effort: {{LOW/MED/HIGH}}
      2. {{step_2}} — effort: {{LOW/MED/HIGH}}
      3. {{step_3}} — effort: {{LOW/MED/HIGH}}

      ## Commands for Review
      ```bash
      # View overnight commits
      git log --oneline main..overnight/{{date}}-{{slug}}

      # See full diff
      git diff main...HEAD --stat

      # Run tests
      npm test

      # Review a specific unit
      git show <commit-hash>

      # Revert if needed
      git revert <commit-hash>
      ```
      ```

      Rules:
      - Scannable in 60 seconds — most important information at the top
      - Be honest about problems — do not sugar-coat or minimize issues
      - Include git commands for reviewing the work
      - Prioritize next steps by impact and urgency
      - If there are regressions, they are the #1 priority item
      - Suggested fixes for skipped units should be specific and actionable
    output: morning_report

  - step: notify
    agent: notifier
    depends_on: [summary]
    input: |
      Send a completion notification for the overnight batch run.

      Morning report: {{morning_report}}

      Produce notifications in two formats:

      **1. Terminal output (ANSI-styled):**
      ```
      ━━━━━━━━━━━━ OVERNIGHT RUN COMPLETE ━━━━━━━━━━━━
      Task:    {{task_name}}
      Done:    {{done}}/{{total}} units
      Skipped: {{skipped}} units
      Cost:    ${{cost}} / ${{ceiling}}
      Tests:   {{pass_count}} passing (baseline: {{baseline}})
      Status:  {{CLEAN / PARTIAL / PROBLEMS}}

      {{if_problems: Top issue: {{one_line_description}} }}

      Run `git log --oneline main..HEAD` to review.
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      ```

      Use ANSI color codes:
      - CLEAN status: green (\033[32m)
      - PARTIAL status: yellow (\033[33m)
      - PROBLEMS status: red (\033[31m)

      **2. Push notification (under 100 characters):**
      ```
      Overnight: {{done}}/{{total}} done, {{skipped}} skipped, ${{cost}}. {{STATUS}}.
      ```

      **3. Telegram/Slack message (if channels configured):**
      ```
      Overnight batch complete:
      - {{done}}/{{total}} units done, {{skipped}} skipped
      - Tests: {{pass_count}} passing (baseline: {{baseline}})
      - Cost: ${{cost}}
      - Status: {{STATUS}}
      {{if_problems: Needs attention: {{top_issue}} }}
      ```

      Output all 3 formats.

      Rules:
      - Keep it short — this is a notification, not a report
      - Include the 4 key numbers: done, total, skipped, cost
      - Always include status (CLEAN/PARTIAL/PROBLEMS)
      - If PROBLEMS, include the single most important issue
      - Terminal version uses ANSI colors for status
      - Push notification must be under 100 characters
    output: notification

verification:
  - Checkpoint created with clean git state and baseline test counts
  - Each successful unit has its own commit (granular rollback)
  - Failed units fully reverted (no broken code committed)
  - Abort conditions were respected (if triggered)
  - Test suite comparison against baseline (actual run, not assumed)
  - Quality spot-check on random sample of completed units
  - Morning report is scannable in 60 seconds
  - Notification sent with key metrics
