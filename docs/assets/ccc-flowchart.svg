  <text x="700" y="1060" text-anchor="middle" font-family="monospace" font-size="12" fill="#444">CC Commander v2.3.0 · 450+ skills · 19 vendors · 11 domains · 187 tests · 91/100 audit</text>
  <text x="700" y="1080" text-anchor="middle" font-family="monospace" font-size="11" fill="#333">kevinz.ai · @kzic · github.com/KevinZai/cc-commander</text>
