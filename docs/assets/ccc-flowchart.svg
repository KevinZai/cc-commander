  <text x="80" y="564" font-family="monospace" font-size="11" fill="#8b949e">│ ○ Code Audit / Review</text>
  <text x="80" y="582" font-family="monospace" font-size="11" fill="#8b949e">│ ○ SEO / Analytics</text>
  <text x="80" y="600" font-family="monospace" font-size="11" fill="#444">└</text>

