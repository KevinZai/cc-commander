  <!-- Build Branch -->
  <line x1="580" y1="136" x2="200" y2="190" stroke="#50ff78" stroke-width="1.5" opacity="0.6"/>
  <rect x="60" y="180" width="280" height="28" rx="6" fill="#1a1b26" stroke="#50ff78" stroke-width="1"/>
  <text x="200" y="199" text-anchor="middle" font-family="monospace" font-size="13" fill="#50ff78">● Build Something New</text>
  <!-- Build sub-items -->
  <text x="80" y="230" font-family="monospace" font-size="11" fill="#8b949e">│ ○ Website / Web App → Claude Code</text>
  <text x="80" y="248" font-family="monospace" font-size="11" fill="#8b949e">│ ○ API / Backend → Claude Code</text>
  <text x="80" y="266" font-family="monospace" font-size="11" fill="#8b949e">│ ○ CLI Tool → Claude Code</text>
  <text x="80" y="284" font-family="monospace" font-size="11" fill="#8b949e">│ ○ Freeform Describe → Claude Code</text>
  <text x="80" y="302" font-family="monospace" font-size="11" fill="#444">└</text>

  <!-- Create Content Branch -->
  <line x1="620" y1="136" x2="200" y2="330" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <rect x="60" y="320" width="280" height="28" rx="6" fill="#1a1b26" stroke="#58a6ff" stroke-width="1"/>
  <text x="200" y="339" text-anchor="middle" font-family="monospace" font-size="13" fill="#58a6ff">○ Create Content</text>
  <text x="80" y="368" font-family="monospace" font-size="11" fill="#8b949e">│ ○ Blog Post → Claude Code</text>
  <text x="80" y="386" font-family="monospace" font-size="11" fill="#8b949e">│ ○ Social Media → Claude Code</text>
  <text x="80" y="404" font-family="monospace" font-size="11" fill="#8b949e">│ ○ Email Campaign → Claude Code</text>
  <text x="80" y="422" font-family="monospace" font-size="11" fill="#8b949e">│ ○ Marketing Copy → Claude Code</text>
  <text x="80" y="440" font-family="monospace" font-size="11" fill="#8b949e">│ ○ Documentation → Claude Code</text>
  <text x="80" y="458" font-family="monospace" font-size="11" fill="#444">└</text>

