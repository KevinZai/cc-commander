<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1400" height="1100" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',monospace" font-size="28" fill="#ff6600" font-weight="bold" filter="url(#glow)">CC Commander v2.3.0 — Complete Flow Map</text>
  <text x="700" y="75" text-anchor="middle" font-family="monospace" font-size="13" fill="#555">450+ skills · 19 vendors · 11 domains · Every path from the main menu</text>

