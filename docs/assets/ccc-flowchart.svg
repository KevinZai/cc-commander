  <text x="980" y="610" font-family="monospace" font-size="10" fill="#8b949e">│ ccc-security(8) ccc-data(8) ccc-research(8)</text>
  <text x="980" y="626" font-family="monospace" font-size="10" fill="#8b949e">│ ccc-mobile(8) ccc-makeover(3)</text>
  <text x="980" y="642" font-family="monospace" font-size="10" fill="#444">└</text>

