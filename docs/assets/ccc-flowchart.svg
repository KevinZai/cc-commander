  <rect x="960" y="660" width="340" height="28" rx="6" fill="#1a1b26" stroke="#8b949e" stroke-width="1"/>
  <text x="1130" y="679" text-anchor="middle" font-family="monospace" font-size="13" fill="#8b949e">○ Settings</text>
  <text x="980" y="708" font-family="monospace" font-size="11" fill="#666">│ Name · Level · Cost Ceiling · Theme</text>
  <text x="980" y="726" font-family="monospace" font-size="11" fill="#666">│ Animations · Linear · Launch Mode</text>
  <text x="980" y="744" font-family="monospace" font-size="11" fill="#444">└</text>

