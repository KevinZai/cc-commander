  <text x="80" y="678" font-family="monospace" font-size="11" fill="#8b949e">│ ○ YOLO Mode (8hr autonomous)</text>
  <text x="80" y="696" font-family="monospace" font-size="11" fill="#8b949e">│ ○ YOLO Loop (experimental)</text>
  <text x="80" y="714" font-family="monospace" font-size="11" fill="#8b949e">│ ○ What is YOLO Mode?</text>
  <text x="80" y="732" font-family="monospace" font-size="11" fill="#444">└</text>

