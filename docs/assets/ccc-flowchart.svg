  <rect x="400" y="890" width="200" height="28" rx="6" fill="#1a1b26" stroke="#ffd700" stroke-width="1"/>
  <text x="500" y="909" text-anchor="middle" font-family="monospace" font-size="13" fill="#ffd700">○ Check My Stats</text>

  <line x1="700" y1="136" x2="860" y2="900" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
  <rect x="760" y="890" width="200" height="28" rx="6" fill="#1a1b26" stroke="#58a6ff" stroke-width="1"/>
  <text x="860" y="909" text-anchor="middle" font-family="monospace" font-size="13" fill="#58a6ff">○ Linear Board</text>

  <!-- Dispatch target -->
  <rect x="450" y="960" width="500" height="44" rx="10" fill="#0d1117" stroke="#ff6600" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="700" y="987" text-anchor="middle" font-family="monospace" font-size="16" fill="#ff6600" font-weight="bold">→ Native Claude Code (--session-id)</text>
  <text x="700" y="1000" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">Interactive session · Resume capable · User can take over</text>

  <!-- Connecting arrows to dispatch -->
  <line x1="200" y1="302" x2="500" y2="960" stroke="#50ff78" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="200" y1="458" x2="550" y2="960" stroke="#58a6ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="200" y1="600" x2="600" y2="960" stroke="#d2a8ff" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  <line x1="200" y1="732" x2="650" y2="960" stroke="#f97583" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>

