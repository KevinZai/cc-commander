<svg xmlns="http://www.w3.org/2000/svg" width="920" height="680">
<defs>
<linearGradient id="fire" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#ff6600"/><stop offset="100%" style="stop-color:#ffcc00"/>
</linearGradient>
<linearGradient id="cyber" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#ff0080"/><stop offset="100%" style="stop-color:#00ffff"/>
</linearGradient>
<linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#50ff78"/><stop offset="50%" style="stop-color:#00c8ff"/><stop offset="100%" style="stop-color:#b464ff"/>
</linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<rect width="100%" height="100%" rx="10" fill="#0d1117"/>
<circle cx="20" cy="16" r="6" fill="#ff5f56"/>
<circle cx="40" cy="16" r="6" fill="#ffbd2e"/>
<circle cx="60" cy="16" r="6" fill="#27c93f"/>
<text x="460" y="20" text-anchor="middle" fill="#555" font-family="'SF Mono',monospace" font-size="11">CC Commander v2.0.0</text>
<line x1="0" y1="32" x2="920" y2="32" stroke="#222" stroke-width="1"/>

<!-- 3-line title: CLAUDE / CODE / COMMANDER -->
<text x="460" y="85" text-anchor="middle" fill="url(#fire)" font-family="'Impact','Arial Black','Helvetica',sans-serif" font-size="52" font-weight="bold" filter="url(#glow)" letter-spacing="10">CLAUDE</text>
<text x="460" y="135" text-anchor="middle" fill="url(#cyber)" font-family="'Impact','Arial Black','Helvetica',sans-serif" font-size="52" font-weight="bold" filter="url(#glow)" letter-spacing="10">CODE</text>
<text x="460" y="185" text-anchor="middle" fill="url(#aurora)" font-family="'Impact','Arial Black','Helvetica',sans-serif" font-size="52" font-weight="bold" filter="url(#glow)" letter-spacing="10">COMMANDER</text>

<!-- Tagline -->
<text x="460" y="215" text-anchor="middle" fill="#999" font-family="'SF Mono',monospace" font-size="13" letter-spacing="1">Every Claude Code tool. One install. Guided access. Auto-updated.</text>

<!-- Badges -->
<rect x="100" y="230" width="100" height="20" rx="4" fill="#161b22"/>
<text x="150" y="244" text-anchor="middle" fill="#ff6600" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">432+ Skills</text>
<rect x="210" y="230" width="95" height="20" rx="4" fill="#161b22"/>
<text x="257" y="244" text-anchor="middle" fill="#ff0080" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">11 Vendors</text>
<rect x="315" y="230" width="90" height="20" rx="4" fill="#161b22"/>
<text x="360" y="244" text-anchor="middle" fill="#00ffff" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">10 Themes</text>
<rect x="415" y="230" width="80" height="20" rx="4" fill="#161b22"/>
<text x="455" y="244" text-anchor="middle" fill="#50ff78" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">78 Cmds</text>
<rect x="505" y="230" width="70" height="20" rx="4" fill="#161b22"/>
<text x="540" y="244" text-anchor="middle" fill="#ffcc00" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">v2.0.0</text>
<rect x="585" y="230" width="55" height="20" rx="4" fill="#161b22"/>
<text x="612" y="244" text-anchor="middle" fill="#b464ff" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">MIT</text>
<rect x="650" y="230" width="90" height="20" rx="4" fill="#161b22"/>
<text x="695" y="244" text-anchor="middle" fill="#27c93f" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">25 Hooks</text>

<!-- Divider -->
<line x1="60" y1="265" x2="700" y2="265" stroke="#333" stroke-width="1" opacity="0.5"/>

<!-- Cockpit -->
<text x="70" y="290" fill="#ff6600" font-family="'SF Mono',monospace" font-size="12" font-weight="bold">Opus 1M</text>
<text x="165" y="290" fill="#444" font-family="'SF Mono',monospace" font-size="11">|</text>
<text x="180" y="290" fill="#fff" font-family="'SF Mono',monospace" font-size="12" font-weight="bold">$2.14</text>
<text x="235" y="290" fill="#444" font-family="'SF Mono',monospace" font-size="11">|</text>
<text x="255" y="290" fill="#00ffff" font-family="'SF Mono',monospace" font-size="11">42K</text>
<text x="290" y="290" fill="#ff0080" font-family="'SF Mono',monospace" font-size="11">8K</text>
<text x="320" y="290" fill="#444" font-family="'SF Mono',monospace" font-size="11">|</text>
<text x="340" y="290" fill="#555" font-family="'SF Mono',monospace" font-size="11">3m12s</text>

<!-- Meters -->
<text x="70" y="315" fill="#666" font-family="'SF Mono',monospace" font-size="10">CTX</text>
<rect x="100" y="305" width="130" height="11" rx="3" fill="#161b22"/>
<rect x="100" y="305" width="81" height="11" rx="3" fill="url(#fire)" opacity="0.85"/>
<text x="240" y="315" fill="#ff6600" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">62%</text>
<text x="290" y="315" fill="#666" font-family="'SF Mono',monospace" font-size="10">RATE</text>
<rect x="325" y="305" width="130" height="11" rx="3" fill="#161b22"/>
<rect x="325" y="305" width="30" height="11" rx="3" fill="url(#cyber)" opacity="0.7"/>
<text x="465" y="315" fill="#ff0080" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">23%</text>

<!-- Stats -->
<text x="70" y="340" fill="#00ffff" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">CC-48</text>
<text x="120" y="340" fill="#777" font-family="'SF Mono',monospace" font-size="10">v2.0 Foundation</text>
<text x="275" y="340" fill="#444" font-family="'SF Mono',monospace" font-size="10">|</text>
<text x="295" y="340" fill="#ff6600" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">432 skills</text>
<text x="395" y="340" fill="#444" font-family="'SF Mono',monospace" font-size="10">|</text>
<text x="415" y="340" fill="#ff0080" font-family="'SF Mono',monospace" font-size="10" font-weight="bold">11 vendors</text>

<line x1="60" y1="355" x2="500" y2="355" stroke="#333" stroke-width="1" opacity="0.3"/>

<!-- Menu -->
<text x="70" y="380" fill="#eee" font-family="'SF Mono',monospace" font-size="13" font-weight="bold">What would you like to do?</text>

<text x="72" y="408" fill="#ff6600" font-family="'SF Mono',monospace" font-size="13" font-weight="bold">&gt;</text>
<text x="90" y="408" fill="url(#fire)" font-family="'SF Mono',monospace" font-size="13" font-weight="bold">Build something new</text>
<text x="90" y="424" fill="#ff6600" font-family="'SF Mono',monospace" font-size="10">websites, APIs, CLI tools</text>

<text x="90" y="448" fill="#ccc" font-family="'SF Mono',monospace" font-size="13">Import a project</text>
<text x="90" y="464" fill="#666" font-family="'SF Mono',monospace" font-size="10">/xray audit + /makeover</text>

<text x="90" y="488" fill="#ccc" font-family="'SF Mono',monospace" font-size="13">Create content</text>
<text x="90" y="504" fill="#666" font-family="'SF Mono',monospace" font-size="10">blog, social, email</text>

<text x="90" y="528" fill="#ccc" font-family="'SF Mono',monospace" font-size="13">YOLO Mode</text>
<text x="90" y="544" fill="#666" font-family="'SF Mono',monospace" font-size="10">autonomous overnight build</text>

<text x="90" y="568" fill="#ccc" font-family="'SF Mono',monospace" font-size="13">Browse CCC Domains</text>
<text x="90" y="584" fill="#666" font-family="'SF Mono',monospace" font-size="10">11 domains, 172+ sub-skills</text>

<text x="90" y="608" fill="#ccc" font-family="'SF Mono',monospace" font-size="13">/ Type a command</text>
<text x="90" y="624" fill="#666" font-family="'SF Mono',monospace" font-size="10">free-text prompt</text>

